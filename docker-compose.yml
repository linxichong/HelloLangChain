services:
  db:
    image: postgres:17-alpine
    container_name: hellolangchain-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hellolangchain}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-hellolangchain}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    container_name: hellolangchain-web
    env_file:
      - .env
    environment:
      CHAT_HOST: 0.0.0.0
      CHAT_PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@db:5432/${POSTGRES_DB:-hellolangchain}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
